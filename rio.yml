schemaVersion: 2.0

timeout: 60

pipelines:
  - branchName: oss-mirror

    trigger:
      timer: '@daily'

    secrets:
      names:
        - ORG
        - GH_TOKEN

    machine:
      baseImage: docker.apple.com/base-images/ubi10/ubi

    build:
      template: freestyle:v4:build
      steps:
        - dnf install -y -q 'dnf-command(config-manager)'
        - dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
        - dnf install -y -q gh git
        - gh auth login --hostname github.pie.apple.com --with-token < $BUILD_SECRETS_PATH/GH_TOKEN
        - gh auth status --hostname github.pie.apple.com
        - gh auth setup-git
        - export ORG="$(cat $BUILD_SECRETS_PATH/ORG)"
        - export SPEC_REPO="${ORG}/cdevents-spec"
        - gh repo set-default "$SPEC_REPO"
        - git remote rm upstream || true
        - git remote add upstream https://github.com/cdevents/spec.git
        - git remote rm mirror || true
        - git remote add mirror "https://github.pie.apple.com/$SPEC_REPO.git"
        - git fetch upstream main
        - git fetch mirror oss-mirror || true
        - git checkout -B oss-mirror mirror/oss-mirror || git checkout -B oss-mirror upstream/main
        - |
          UPSTREAM_SHA="$(git rev-parse upstream/main)"
          MIRROR_SHA="$(git rev-parse HEAD)"

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "oss-mirror is already up to date with upstream/main"
            exit 0
          fi
        - git rebase upstream/main
        - git push mirror oss-mirror:oss-mirror -f
        - |
          if ! gh pr list --repo "$SPEC_REPO" --base main --head oss-mirror --state open --json number --jq 'length > 0' | grep -q true; then
            gh pr create \
              --repo "$SPEC_REPO" \
              --base main \
              --head oss-mirror \
              --title "Sync oss-mirror to main" \
              --body "Automated PR to merge the latest mirrored upstream changes from \`oss-mirror\` into \`main\`."
          else
            echo "Open PR from oss-mirror to main already exists"
          fi
          
  - group: publish-schemas-branch
    branchRules:
      includePatterns:
        - main

    secrets:
      names:
        - GH_TOKEN

    trigger:
      gitPush: false

    machine:
      baseImage: docker.apple.com/base-images/ubi9/java11-builder:latest

    build:
      template: freestyle:v4:publish
      buildParameters:
        - parameter: VERSION
          description: "Version to publish (e.g. 0.6.0). Defaults to version.txt with -draft removed."
          defaultValue: ""
      steps:
        - dnf install -y -q 'dnf-command(config-manager)'
        - dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
        - dnf install -y -q gh git git-subtree
        - gh auth login --hostname github.pie.apple.com --with-token < $BUILD_SECRETS_PATH/GH_TOKEN
        - gh auth setup-git
        - git remote set-url origin "$(git remote get-url origin | sed 's|git@github.pie.apple.com:|https://github.pie.apple.com/|')"
        - |
          DRAFT_VERSION=$(cat version.txt)
          VERSION="${BUILD_PARAM_VERSION:-${DRAFT_VERSION%-draft}}"
          echo "Publishing schemas at version ${VERSION} (was ${DRAFT_VERSION})"

          git branch -D release || true
          git subtree split --prefix=schemas --branch release

          git checkout release
          find . -name "*.json" -exec sed -i "s|/${DRAFT_VERSION}/|/${VERSION}/|g" {} +
          git add -u
          git diff --cached --quiet || git commit -m "chore: set version to ${VERSION}"
          git push origin release -f
          LATEST=$(git ls-remote --tags origin "refs/tags/schemas/v${VERSION}-r*" | awk '{print $2}' | sed "s|refs/tags/schemas/v${VERSION}-r||" | sort -n | tail -1)
          REVISION=$([ -z "$LATEST" ] && echo 0 || echo $((LATEST + 1)))
          git tag -d "schemas/v${VERSION}-r${REVISION}" 2>/dev/null || true
          git tag "schemas/v${VERSION}-r${REVISION}"
          git push origin "schemas/v${VERSION}-r${REVISION}"
